services:
  - type: web
    name: fe-asp-net
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://chuyen-de-asp.onrender.com/api
